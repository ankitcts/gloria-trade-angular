services:
  mongodb:
    image: mongo:7
    container_name: gloria-trade-angular-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: gloria_admin
      MONGO_INITDB_ROOT_PASSWORD: gloria_secret_dev
      MONGO_INITDB_DATABASE: gloria_trade_angular
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  mongo-express:
    image: mongo-express
    container_name: gloria-trade-angular-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: gloria_admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: gloria_secret_dev
      ME_CONFIG_MONGODB_URL: mongodb://gloria_admin:gloria_secret_dev@mongodb:27017/
    depends_on:
      - mongodb

volumes:
  mongodb_data:
